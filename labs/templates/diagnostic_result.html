<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DevOps Helper - Result</title>
  <style>
    body { font-family: sans-serif; margin: 2rem; background: #f5f7fa; color: #1f2937; }
    .card { background: white; border: 1px solid #e5e7eb; border-radius: 8px; padding: 1rem; }
    pre { background: #111827; color: #e5e7eb; padding: 1rem; border-radius: 8px; overflow-x: auto; }
    .error { color: #b91c1c; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Result: {{ command_key }}</h1>
    <p><strong>Action:</strong> {{ command }}</p>
    {% if extra_context %}
      <p><strong>Context:</strong></p>
      <pre>{{ extra_context }}</pre>
    {% endif %}
    <p><strong>Output:</strong></p>
    <pre>{{ output }}</pre>
    {% if error %}
      <p class="error"><strong>Error:</strong> {{ error }}</p>
    {% endif %}
    <p><a href="{{ url_for('index') }}">Back to dashboard</a></p>
  </div>
</body>
</html>
